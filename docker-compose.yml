version: "3.9"

services:
  suraksha-net:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suraksha-net
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      # Mount the CSV dataset from your host machine
      - ${ACCIDENTS_CSV_PATH:-./data}:/data:ro
    environment:
      - ACCIDENTS_CSV_PATH=/data/final_merged_accidents.csv
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
